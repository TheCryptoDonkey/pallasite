name: Release Static

on:
  workflow_dispatch:

# Shares the original Deploy workflow's lock so a resumed old workflow and
# this fallback cannot rsync the same host at the same time.
concurrency:
  group: deploy-pallasite
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Signet Login bundle drift
        run: pnpm run check:signet-login

      - name: Typecheck + build
        run: pnpm build

      - name: Deploy to Hetzner
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H <deploy-host> >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ deploy@<deploy-host>:<pallasite-static-root>/
