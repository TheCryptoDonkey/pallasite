name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'controller-ws/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'

# Cancel any in-flight deploy when a newer push lands; we only ever want
# the latest tip of main on the server.
concurrency:
  group: deploy-pallasite
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm build

      - name: Deploy to Hetzner
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H <deploy-host> >> ~/.ssh/known_hosts
          # Static SPA — the existing pallasite/watch/mobile vhosts.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ deploy@<deploy-host>:<pallasite-static-root>/
          # Controller WebSocket relay — Node service that pairs phone
          # controllers with the big screen on controller.pallasite.app.
          # Excludes node_modules so we don't push the local install;
          # `npm ci` runs server-side only if package-lock changed.
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=package-lock.json \
            -e "ssh -i ~/.ssh/deploy_key" \
            controller-ws/ deploy@<deploy-host>:<controller-ws-deploy-root>/
          # Install + restart. systemctl restart is a no-op if the unit
          # isn't installed yet; first-time install is documented in
          # controller-ws/README.md and runs once by hand.
          ssh -i ~/.ssh/deploy_key deploy@<deploy-host> \
            'cd <controller-ws-deploy-root> && npm install --omit=dev --no-audit --no-fund && sudo systemctl restart pallasite-controller-ws.service 2>&1 || true'
