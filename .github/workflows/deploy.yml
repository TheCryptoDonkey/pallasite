name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/release-static.yml'

# Cancel any in-flight deploy when a newer push lands; we only ever want
# the latest tip of main on the server.
concurrency:
  group: deploy-pallasite
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm build

      - name: Deploy to Hetzner
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 95.217.39.110 >> ~/.ssh/known_hosts
          # Static SPA — the existing pallasite/watch/mobile vhosts.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ deploy@95.217.39.110:/opt/pallasite/
          # Controller WebSocket relay used to deploy from here too; it
          # now lives upstream (forgesworn/joystick) and has its own
          # workflow. controller-ws/ in this repo is a one-week rollback
          # path; edits there no longer reach production.
