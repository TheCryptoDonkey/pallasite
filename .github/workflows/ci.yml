name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tools/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-pallasite-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Signet Login bundle drift
        run: pnpm run check:signet-login

      - name: Run harnesses
        run: pnpm test

      - name: Typecheck + build
        run: pnpm build
