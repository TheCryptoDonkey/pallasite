<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>determinism harness</title>
<style>html,body{margin:0;background:#06080f;color:#8cffb4;font:14px/1.6 ui-monospace,monospace;padding:24px}</style>
</head>
<body>
<pre id="out">running determinism check...</pre>
<script type="module">
// B3.0 regression harness. Runs the campaign sim from a fixed seed and a
// fixed scripted input, hashing the gameplay-relevant slice of GameState
// every fixed step. Identical hash sequences prove the sim is deterministic,
// the basis for B3 verifiable replay.
//
// Three runs, two checks:
//   A vs B   same render mode: proves run-to-run determinism.
//   A vs C   retro vs modern-portrait render mode: proves the sim is
//            viewport-independent. Display mode, orientation and window size
//            must never reach the simulation, or a phone-recorded run cannot
//            be re-verified on a desktop. See b3-verifiable-replay.md.
//
// Cosmetic pools (particles, debris, shockwave rings) are deliberately
// excluded: they ride Math.random, never feed gameplay, and a verifier
// never renders. Math.random is NOT reset between runs, so a pass also
// proves cosmetic RNG never leaks into the simulation.
import { makeInitialState, startGame, updateGame, tryActivateShield, tryHyperspace } from '/src/game.ts';
import { getRngState } from '/src/seed.ts';
import { setRenderMode } from '/src/render.ts';

const STEPS = 6000;            // ~100s of sim at a fixed 60Hz
const SEED = 0x1234abcd;

// Two render modes the runs execute under. The sim must produce an identical
// hash sequence in both: the camera adapts the view, never the world. RETRO
// is the full 1280x720 world; PORTRAIT is a cover-scaled phone band, the case
// that used to crop the sim's wrap distance before the B3 decoupling.
const RETRO_MODE = {
  kind: 'retro', vw: 1280, vh: 720, dpr: 1, scale: 1, tx: 0, ty: 0,
  insets: { top: 0, right: 0, bottom: 0, left: 0 },
};
const PORTRAIT_MODE = (() => {
  const vw = 390, vh = 844, dpr = 2;
  const scale = Math.max(vw / 1280, vh / 720);
  return {
    kind: 'modern', vw, vh, dpr, scale,
    tx: (vw - 1280 * scale) / 2, ty: (vh - 720 * scale) / 2,
    insets: { top: 47, right: 0, bottom: 34, left: 0 },
  };
})();

function fnv1a(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// The gameplay-relevant slice. Entity cosmetic fields (asteroid hue /
// rotation / shape, hitFlash) and the particle / debris pools are omitted.
function serialize(s) {
  const ent = (e) => [e.pos.x, e.pos.y, e.vel ? e.vel.x : 0, e.vel ? e.vel.y : 0];
  return JSON.stringify({
    f: s.frame, ph: s.phase, sc: s.score, w: s.wave, lv: s.lives,
    st: s.sats, cb: s.combo, el: s.elapsed, hs: s.hitStopSteps,
    rng: getRngState(),
    sh: [s.ship.pos.x, s.ship.pos.y, s.ship.vel.x, s.ship.vel.y, s.ship.rot,
         s.ship.alive, s.ship.shieldUp, s.ship.shieldExpiresAt,
         s.ship.invulnerableUntil, s.ship.hyperspaceReadyAt, s.ship.hyperspaceCloakMs],
    ast: s.asteroids.map((a) => [a.pos.x, a.pos.y, a.vel.x, a.vel.y, a.radius, a.id, a.hp]),
    ufo: s.ufos.map((u) => [u.pos.x, u.pos.y, u.vel.x, u.vel.y, u.hp ?? 0]),
    bul: s.bullets.map(ent),
    ebul: s.enemyBullets.map(ent),
    mine: s.mines.map((m) => [m.pos.x, m.pos.y]),
    coin: s.coins.map((c) => [c.pos.x, c.pos.y, c.vel ? c.vel.x : 0, c.vel ? c.vel.y : 0]),
    pow: s.powerups.map((p) => [p.pos.x, p.pos.y]),
  });
}

// Deterministic input script — identical for every run.
function applyInput(s, step) {
  const k = s.keys;
  k['ArrowUp'] = (step % 3) !== 0;
  k['ArrowLeft'] = (step % 7) < 2;
  k['ArrowRight'] = (step % 11) < 3;
  k['Space'] = (step % 5) === 0;
}

function runOnce(seed, steps, mode) {
  setRenderMode(mode);
  const s = makeInitialState();
  startGame(s, seed);
  const hashes = new Array(steps);
  for (let step = 0; step < steps; step++) {
    applyInput(s, step);
    // Exercise the converted shield / hyperspace deadlines too.
    if (step % 240 === 120) tryActivateShield(s, s.elapsed);
    if (step % 600 === 360) tryHyperspace(s, s.elapsed);
    // Mirror the loop: a hit-stop step skips the sim tick.
    if (s.hitStopSteps > 0) s.hitStopSteps--;
    else updateGame(s);
    hashes[step] = fnv1a(serialize(s));
  }
  return hashes;
}

const out = document.getElementById('out');
let verdict;
try {
  const t0 = performance.now();
  const a = runOnce(SEED, STEPS, RETRO_MODE);
  const b = runOnce(SEED, STEPS, RETRO_MODE);
  const c = runOnce(SEED, STEPS, PORTRAIT_MODE);
  const ms = Math.round(performance.now() - t0);
  const diff = (x, y) => {
    for (let i = 0; i < STEPS; i++) if (x[i] !== y[i]) return i;
    return -1;
  };
  const dab = diff(a, b);   // run-to-run determinism
  const dac = diff(a, c);   // viewport-independence
  if (dab === -1 && dac === -1) {
    verdict = 'DETERMINISM-PASS';
    out.textContent = 'DETERMINISM-PASS\n\n' + STEPS + ' steps, three runs, identical hash sequence.\n' +
      'A vs B (run-to-run) and A vs C (retro vs modern-portrait) both match.\n' +
      'seed = 0x' + SEED.toString(16) + '\nfinal hash = ' + a[STEPS - 1] + '\n' + ms + 'ms';
  } else if (dab !== -1) {
    verdict = 'DETERMINISM-FAIL';
    out.textContent = 'DETERMINISM-FAIL (run-to-run)\n\nfirst divergence at step ' + dab +
      '\nrun A hash = ' + a[dab] + '\nrun B hash = ' + b[dab] +
      '\n(steps 0.. ' + (dab - 1) + ' matched)';
  } else {
    verdict = 'DETERMINISM-FAIL';
    out.textContent = 'DETERMINISM-FAIL (viewport coupling)\n\n' +
      'retro and modern-portrait runs diverge at step ' + dac +
      '\nretro hash = ' + a[dac] + '\nportrait hash = ' + c[dac] +
      '\n(steps 0.. ' + (dac - 1) + ' matched)\n\n' +
      'The sim is reading render/viewport state. See b3-verifiable-replay.md.';
  }
} catch (e) {
  verdict = 'DETERMINISM-ERROR';
  out.textContent = 'DETERMINISM-ERROR\n\n' + ((e && e.stack) || e);
}
document.title = verdict;
</script>
</body>
</html>
