<script type="module">
// Regression harness. One file per duel bug we've fixed; each case is small
// and checks a sim-level invariant that the original bug would violate. Adds
// a green/red gate so a future change can't quietly resurrect any of them.
//
// Currently covered:
//
//   - bc7ec95 distinct 2P spawn — startGame for two players must place the
//     ships at distinct world positions; the original bug spawned them on
//     top of each other (both at WORLD_W/2, WORLD_H/2).
//
//   - 894b128 localHeading mirror — samplePlayerInput's heading override
//     must take precedence over p.targetHeading, so the joystick's mirror
//     survives the lockstep apply step that clobbers p.targetHeading from
//     the delayed input log.
//
//   - 894b128 localThrust mirror — samplePlayerInput's thrustOverride
//     override must take precedence over p.thrustOverride, same reason.
//
//   - deathmatch/parallax/rendering invariants: decorative asteroids never
//     collide, terrain cover deflects instead of kills, deathmatch respawns
//     choose a clear variant, and the death replay impact spawns a visible
//     particle/debris burst.
//
//   - deathmatch AI invariants: Easy bot skill is softer than Normal, bots
//     can raise shields against incoming shots, and shields block player
//     bullets.
import {
  makeInitialState,
  startGame,
  beginWave,
  updateGame,
  FIXED_STEP_S,
  spawnAsteroid,
  __testRespawnShip,
} from '/src/game.ts';
import { render, setRenderMode } from '/src/render.ts';
import { deathmatchArenaSize, deathmatchSpawnPoint, defaultDeathmatchAiSkill } from '/src/deathmatch.ts';
import { REPLAY_EXPLOSION_MS, REPLAY_SLOW_MS, REPLAY_SLOW_RATE, SHIP_THRUST, SHIP_DRAG } from '/src/types.ts';
import { samplePlayerInput, applyPlayerInput, EMPTY_INPUT } from '/src/netcode.ts';
import { currentMode } from '/src/mode.ts';
import { addLocalHighScore, clearLocalHighScores, getLocalHighScores, isHighScore } from '/src/score.ts';

const RETRO_MODE = {
  kind: 'retro', vw: 1280, vh: 720, dpr: 1, scale: 1, tx: 0, ty: 0,
  insets: { top: 0, right: 0, bottom: 0, left: 0 },
};
setRenderMode(RETRO_MODE);

const cases = [];

function test(name, fn) {
  try {
    fn();
    cases.push({ name, ok: true, detail: 'ok' });
  } catch (e) {
    cases.push({ name, ok: false, detail: (e && e.message) || String(e) });
  }
}

function assertEq(actual, expected, label) {
  if (actual !== expected) {
    throw new Error(`${label}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}

function assertNe(actual, forbidden, label) {
  if (actual === forbidden) {
    throw new Error(`${label}: expected NOT ${JSON.stringify(forbidden)}, got ${JSON.stringify(actual)}`);
  }
}

function assert(condition, label) {
  if (!condition) throw new Error(label);
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// bc7ec95 — distinct 2P spawn.
test('bc7ec95 distinct 2P spawn', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  assertEq(s.players.length, 2, 'players.length');
  const p0 = s.players[0].ship.pos;
  const p1 = s.players[1].ship.pos;
  // The two ships must NOT share the same point. Anything at the world
  // centre would mean the distinct-spawn change in bc7ec95 has regressed.
  if (p0.x === p1.x && p0.y === p1.y) {
    throw new Error(`p0 and p1 spawn co-located at (${p0.x}, ${p0.y})`);
  }
});

// 894b128 — localHeading override takes precedence over p.targetHeading.
test('894b128 localHeading override read', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };
  // Live state says heading 1.5 — but the local mirror should win.
  p.targetHeading = 1.5;
  const sampled = samplePlayerInput(p, edges, undefined, undefined, 0.5);
  assertEq(sampled.heading, 0.5, 'sampled.heading (mirror=0.5, live=1.5)');
});

// 894b128 — undefined override falls through to live p.targetHeading.
test('894b128 localHeading undefined override', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };

  const sampled = samplePlayerInput(p, edges);
  assertEq(sampled.heading, 1.5, 'sampled.heading (no override, live=1.5)');
});

// 894b128 — explicit null override holds (does not fall through).
test('894b128 localHeading null override holds', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };
  p.targetHeading = 1.5;
  const sampled = samplePlayerInput(p, edges, undefined, undefined, null);
  assertEq(sampled.heading, null, 'sampled.heading (override=null, live=1.5)');
});

// 894b128 — the apply step clobbers p.targetHeading, but a subsequent
// sample reads the mirror, not the now-stale p value. This is the actual
// joystick-survives-apply contract that the original bug broke.
test('894b128 localHeading survives apply clobber', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };
  // Joystick has written heading 0.5 into its mirror; live p.targetHeading
  // matches at first.
  p.targetHeading = 0.5;
  // The lockstep apply step writes the delayed-log input (heading=null)
  // back into p, clobbering the live value. The bug was that the next
  // sample would then read null from p.
  applyPlayerInput(p, EMPTY_INPUT);
  assertEq(p.targetHeading, null, 'p.targetHeading clobbered by apply');
  // The sample with the joystick mirror must STILL see 0.5.
  const sampled = samplePlayerInput(p, edges, undefined, undefined, 0.5);
  assertEq(sampled.heading, 0.5, 'sampled.heading after apply (mirror=0.5)');
});

// 894b128 — thrust mirror, same pattern as heading.
test('894b128 localThrust override read', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };
  p.thrustOverride = false;
  const sampled = samplePlayerInput(p, edges, undefined, true);
  assertEq(sampled.thrustOverride, true, 'sampled.thrustOverride (mirror=true, live=false)');
});

// 894b128 — thrust override survives apply clobber.
test('894b128 localThrust survives apply clobber', () => {
  const s = makeInitialState();
  startGame(s, 0x1234abcd, { players: 2 });
  const p = s.players[0];
  const edges = { hyperspace: false, shield: false };
  p.thrustOverride = true;
  applyPlayerInput(p, EMPTY_INPUT);
  assertEq(p.thrustOverride, false, 'p.thrustOverride clobbered by apply');
  const sampled = samplePlayerInput(p, edges, undefined, true);
  assertEq(sampled.thrustOverride, true, 'sampled.thrustOverride after apply (mirror=true)');
});

// Decorative parallax rocks are visual only. They should not kill a ship even
// when exactly co-located with the player, and they should survive bullets.
test('decorative parallax asteroids never collide', () => {
  const s = makeInitialState();
  startGame(s, 0x51a7, { players: 1, runMode: 'campaign' });
  s.phase = 'playing';
  s.elapsed = 5000;
  const p = s.players[0];
  p.ship.pos.x = 640;
  p.ship.pos.y = 360;
  p.ship.vel.x = 0;
  p.ship.vel.y = 0;
  p.ship.invulnerableUntil = -1;
  p.ship.alive = true;
  const decorative = spawnAsteroid(
    'large',
    12,
    { x: p.ship.pos.x, y: p.ship.pos.y },
    { x: 0, y: 0 },
    'stony',
    { depth: 1 },
  );
  s.asteroids = [decorative];
  updateGame(s);
  assertEq(p.ship.alive, true, 'ship survives decorative overlap');
  assertEq(decorative.alive, true, 'decorative asteroid remains alive');
});

// Deathmatch terrain cover should be an obstacle, not a death trigger.
test('deathmatch terrain pushes instead of kills', () => {
  const s = makeInitialState();
  startGame(s, 0x51a7, { players: 2, runMode: 'deathmatch' });
  s.phase = 'playing';
  s.elapsed = 5000;
  const p = s.players[0];
  const terrain = s.asteroids.find((a) => a.terrain);
  assert(terrain, 'expected deathmatch terrain');
  s.asteroids = [terrain];
  const minDist = p.ship.radius + terrain.radius + 2;
  p.ship.pos.x = terrain.pos.x + minDist - 24;
  p.ship.pos.y = terrain.pos.y;
  p.ship.vel.x = -120;
  p.ship.vel.y = 0;
  p.ship.invulnerableUntil = -1;
  p.ship.shieldUp = false;
  p.ship.alive = true;
  const lives = p.lives;
  updateGame(s);
  assertEq(p.ship.alive, true, 'ship survives terrain contact');
  assertEq(p.lives, lives, 'terrain contact does not consume a respawn');
  assert(dist(p.ship.pos, terrain.pos) >= minDist - 0.75, `ship pushed clear of terrain (dist=${dist(p.ship.pos, terrain.pos)}, min=${minDist})`);
});

test('deathmatch ship thrust matches campaign near terrain gravity', () => {
  const s = makeInitialState();
  startGame(s, 0x51a7, { players: 2, runMode: 'deathmatch', aiOpponents: false });
  const terrain = s.asteroids.find((a) => a.terrain && a.gravity > 0);
  assert(terrain, 'expected gravity terrain');
  const p = s.players[0];
  p.ship.pos.x = terrain.pos.x + terrain.radius + 400;
  p.ship.pos.y = terrain.pos.y;
  p.ship.vel.x = 0;
  p.ship.vel.y = 0;
  p.ship.rot = 0;
  p.ship.rotVel = 0;
  p.ship.invulnerableUntil = s.elapsed + 10_000;
  p.keys.ArrowUp = true;
  updateGame(s);
  const expectedVx = SHIP_THRUST * FIXED_STEP_S * Math.exp(-SHIP_DRAG * FIXED_STEP_S);
  assert(Math.abs(p.ship.vel.x - expectedVx) < 0.02, `deathmatch thrust vx drifted (${p.ship.vel.x} vs ${expectedVx})`);
  assert(Math.abs(p.ship.vel.y) < 0.02, `deathmatch thrust injected y velocity (${p.ship.vel.y})`);
});

// Deathmatch respawn should skip blocked spawn variants while the deadline has
// not expired, avoiding both giant terrain and live ships.
test('deathmatch respawn chooses a clear spawn variant', () => {
  const s = makeInitialState();
  startGame(s, 0x51a7, { players: 4, runMode: 'deathmatch' });
  s.phase = 'playing';
  s.elapsed = 7000;
  s.asteroids = [];
  const dead = s.players[0];
  const base = deathmatchSpawnPoint(0, s.players.length, 0);
  const variant1 = deathmatchSpawnPoint(0, s.players.length, 1);
  const blocker = spawnAsteroid(
    'large',
    20,
    { x: base.x, y: base.y },
    { x: 0, y: 0 },
    'ballast',
    { terrain: true, gravity: 0 },
  );
  blocker.radius = 320;
  blocker.hp = Number.POSITIVE_INFINITY;
  blocker.hpMax = Number.POSITIVE_INFINITY;
  s.asteroids.push(blocker);
  s.players[1].ship.pos.x = variant1.x;
  s.players[1].ship.pos.y = variant1.y;
  s.players[1].ship.alive = true;
  dead.ship.alive = false;
  dead.lives = 3;
  const placed = __testRespawnShip(s, dead, s.elapsed + 2000);
  assertEq(placed, true, 'respawn placed before deadline');
  assertEq(dead.ship.alive, true, 'respawned ship alive');
  assert(dist(dead.ship.pos, base) > 400, 'respawn avoided terrain-blocked base spawn');
  assert(dist(dead.ship.pos, variant1) > 260, 'respawn avoided live-player-blocked variant');
});

// Death replay should produce the actual visual burst at impact time: green,
// yellow and white particles plus line debris rendered near the death point.
test('death replay explosion is visible at impact', () => {
  const s = makeInitialState();
  startGame(s, 0x51a7, { players: 1, runMode: 'campaign' });
  const impact = { x: 640, y: 360 };
  s.phase = 'deathreplay';
  s.phaseStart = 0;
  s.elapsed = 0;
  s.asteroids = [];
  s.ufos = [];
  s.mines = [];
  s.bullets = [];
  s.enemyBullets = [];
  s.particles = [];
  s.debris = [];
  s.deathReplay = {
    snapshots: [
      { t: 0, ship: { pos: { x: 620, y: 360 }, rot: 0, alive: true, thrusting: true }, asteroids: [], ufos: [], bullets: [], enemyBullets: [], mines: [] },
      { t: 1000, ship: { pos: impact, rot: 0.35, alive: true, thrusting: false }, asteroids: [], ufos: [], bullets: [], enemyBullets: [], mines: [] },
    ],
    startedAt: 0,
    spanMs: 1000,
    explosionAt: impact,
    explosionShip: { pos: impact, vel: { x: 40, y: -15 }, rot: 0.35 },
    explosionSpawned: false,
  };
  const impactWall = Math.max(0, 1000 - Math.min(REPLAY_SLOW_MS, 1000))
    + Math.min(REPLAY_SLOW_MS, 1000) / REPLAY_SLOW_RATE;
  const ticks = Math.ceil((impactWall + REPLAY_EXPLOSION_MS * 0.25) / (1000 / 60));
  for (let i = 0; i < ticks; i++) updateGame(s);
  assertEq(s.deathReplay.explosionSpawned, true, 'explosion spawned');
  assert(s.particles.length >= 70, `expected particle burst, got ${s.particles.length}`);
  assert(s.debris.length >= 4, `expected ship debris, got ${s.debris.length}`);

  const c = document.createElement('canvas');
  c.width = 1280;
  c.height = 720;
  render(c, s, s.elapsed);
  const ctx = c.getContext('2d');
  assert(ctx, '2D context available');
  const data = ctx.getImageData(impact.x - 48, impact.y - 48, 96, 96).data;
  let bright = 0;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i + 1], b = data[i + 2];
    if (Math.max(r, g, b) > 150 && (g > 100 || r > 180)) bright++;
  }
  assert(bright > 80, `expected visible explosion pixels, got ${bright}`);
});

const out = document.getElementById('out');
const failed = cases.filter((c) => !c.ok);
let verdict;
if (failed.length === 0) {
  verdict = 'REGRESSION-PASS';
  out.textContent = 'REGRESSION-PASS\n\n' + cases.length + ' cases, all green.\n\n' +
    cases.map((c) => '  [PASS] ' + c.name).join('\n');
} else {
  verdict = 'REGRESSION-FAIL';
  out.textContent = 'REGRESSION-FAIL\n\n' +
    failed.length + ' / ' + cases.length + ' cases failing.\n\n' +
    cases.map((c) => '  [' + (c.ok ? 'PASS' : 'FAIL') + '] ' + c.name + (c.ok ? '' : '\n         ' + c.detail)).join('\n');
}
document.title = verdict;
</script>
</body>
</html>
