<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0418" />
  <meta name="description" content="Cosmic arcade Asteroids with Lightning sat payouts and Nostr leaderboards. Sign in with Nostr." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pallasite" />
  <title>Pallasite</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="game" width="1280" height="720" aria-label="Pallasite game"></canvas>
  <!-- WebGL overlay: transparent canvas stacked over #game for the mesh
       visual tier. Lazy-initialised on first mesh-tier render; absent
       browsers / users on vector/shaded never pay the three.js cost. -->
  <canvas id="game3d" width="1280" height="720" aria-hidden="true"></canvas>
  <div id="ui-root"></div>
  <div id="touch-controls"></div>
  <!-- Shared-arena multiplayer (M3) stall overlay. Hidden by default;
       main.ts toggles `body[data-peer-stall="waiting"]` after the lockstep
       loop has been unable to advance for ~100ms. Clears either when input
       resumes or when the partner is declared lost (toast + gameover take
       over from there). Solo and couch never set the attribute. -->
  <div id="peer-stall-overlay" aria-hidden="true">
    <div class="peer-stall-inner">
      <p class="peer-stall-title">Waiting for opponent…</p>
      <p class="peer-stall-sub">Hold on, syncing.</p>
    </div>
  </div>
  <!-- Portrait nudge: the 16:9 world is a thin strip on a portrait phone.
       CSS shows this on portrait + touch only; #rotate-hint-dismiss (wired
       in main.ts) lets the player keep portrait if they prefer it. -->
  <div id="rotate-hint">
    <div class="rotate-hint-inner">
      <div class="rotate-hint-phone" aria-hidden="true"></div>
      <p class="rotate-hint-title">Turn your device</p>
      <p class="rotate-hint-sub">Pallasite plays widescreen. Rotate to landscape for the full field.</p>
      <button type="button" id="rotate-hint-dismiss">Play in portrait anyway</button>
    </div>
  </div>
  <!-- Signet SDKs share window.Signet. signet-verify replaces window.Signet
       on load; signet-login is additive (Object.assign) and merges its login
       methods on top. So signet-verify MUST load first or login will be lost. -->
  <script src="/signet-verify.iife.js"></script>
  <script src="/signet-login.iife.js"></script>
  <script type="module" src="/src/main.ts"></script>
  <!-- Service worker registration moved to main.ts so the update-detection
       hook can talk to the in-app UI directly. -->
</body>
</html>
