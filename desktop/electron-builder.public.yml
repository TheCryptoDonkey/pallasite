# Public download build (pallasite.app → GitHub Releases): Windows, macOS, Linux.
# Distinct from electron-builder.yml (the booth kiosk AppImage). The public build
# is a normal window that talks to the production broker + faucet, so it does NOT
# bundle the local controller-ws broker. Variant baked via PALLASITE_VARIANT=public.
appId: app.pallasite.game
productName: Pallasite
copyright: © Pallasite

directories:
  output: out-public
  buildResources: build

files:
  - main.js
  - static-server.mjs
  - variants.mjs
  - package.json

# Game + baked config only — no broker (public uses controller.pallasite.app).
extraResources:
  - from: resources/dist
    to: dist
  - from: resources/app-config.json
    to: app-config.json

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.action-games
  icon: build/icon.png
  # Version-less names so pallasite.app can link to stable
  # releases/latest/download/<name> URLs that survive version bumps.
  artifactName: Pallasite-mac-${arch}.${ext}

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
  artifactName: Pallasite-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Game
  icon: build/icon.png
  artifactName: Pallasite-linux-${arch}.${ext}
  synopsis: "Cosmic arcade Asteroids with Lightning payouts and Nostr leaderboards."

publish:
  provider: github
  owner: TheCryptoDonkey
  repo: pallasite
